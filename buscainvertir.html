<!DOCTYPE HTML>
<html>
<head>
    <meta property="og:title" content="QuieroInmuebles.ar - Búsqueda Activa Inversión" />
    <meta property="og:description" content="Encontrá tu próxima inversión o vivienda de forma fácil." />
    <meta property="og:image" content="https://quieroinmuebles.ar/assets/images/quiero600c-fondo.webp" />
    <meta property="og:url" content="https://quieroinmuebles.ar/index.html" />
    <meta property="og:type" content="website" />

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/images/quiero192c-fondo.webp" type="image/webp">
    <title>Búsqueda Activa Inversión - Quiero Inmuebles</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
    
    <style>
        /* 1. FONDO Y BASE */
        body, #page-wrapper { background-color: #212534 !important; }

        /* 2. HEADER FIJO */
        header#header {
            background-color: #212534 !important;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 10000;
        }

        /* 3. BANNER DINÁMICO */
        #banner-dinamico {
            background-color: #493382;
            padding: 1.5em 0 1em 0; 
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-top: 0; 
        }

        #banner-dinamico h2 {
            color: white; 
            margin: 0; 
            font-size: 1.2em !important; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 400;
        }

        #banner-dinamico p {
            color: rgba(255,255,255,0.5); 
            margin-top: 0.2em;
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 4. AJUSTE DEL FORMULARIO */
        .wrapper.style5 { 
            background-color: #212534 !important; 
            padding: 2em 0 !important; 
        }

        form {
            background: rgba(255, 255, 255, 0.02);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 900px;
            margin: 0 auto;
        }

        .section-title {
            border-bottom: 2px solid #D4A261;
            margin: 1.5em 0 1em 0;
            padding-bottom: 0.5em;
            color: #D4A261 !important;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        label { color: rgba(255, 255, 255, 0.7) !important; font-weight: 600; font-size: 0.9em; }

        input, select, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
        }

        /* 6. BOTÓN */
        .button.primary {
            background-color: #493382 !important;
            transition: all 0.3s ease;
        }

        .button.primary:hover {
            background-color: #493382 !important;
            transform: translateY(-2px);
        }

        /* 7. AJUSTE DE INPUTS DE NÚMERO */
        input[name="Dormitorios"], 
        input[name="Baños"] {
            width: 60px !important;
            text-align: center;
            margin: 0 auto;
            padding: 0 !important;
            height: 3em !important; 
        }
    </style>
</head>
<body class="is-preload">
    <div id="page-wrapper">
        <header id="header">
            <h1><a href="index.html">Quieroinmuebles.ar</a></h1>
            <nav id="nav">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                </ul>
            </nav>
        </header>

        <section id="banner-dinamico">
            <div class="inner">
                <h2>Búsqueda Activa - Invertir / Comprar</h2>
                <p>Cargá tus preferencias para activar tu búsqueda</p>
            </div>
        </section>

        <article id="main">
    <section class="wrapper style5">
        <div class="inner">
            <form id="form-busqueda">
                
                <div class="section-title">Datos Personales</div>
                <div class="row gtr-uniform">
                    <div class="col-6 col-12-xsmall">
                        <label>Nombre</label>
                        <input type="text" name="Nombre" placeholder="Tu nombre" required />
                    </div>
                    <div class="col-6 col-12-xsmall">
                        <label>Apellido</label>
                        <input type="text" name="Apellido" placeholder="Tu apellido" required />
                    </div>
                    <div class="col-6 col-12-xsmall">
                        <label>Email</label>
                        <input type="email" name="Email" placeholder="correo@ejemplo.com" required />
                    </div>
                    <div class="col-6 col-12-xsmall">
                        <label>Teléfono (WhatsApp)</label>
                        <input type="text" name="Telefono" placeholder="Ej: 3534123456" required />
                    </div>

                    <div class="col-12">
                        <div class="section-title" style="margin-top: 2em;">¿Qué estás buscando?</div>
                    </div>
                    
                    <div class="col-6 col-12-xsmall">
                        <label>Tipo de Propiedad</label>
                        <select name="Tipo Propiedad a Buscar">
                            <option value="Casa">Casa</option>
                            <option value="Departamento">Departamento</option>
                            <option value="Terreno">Terreno</option>
                            <option value="Propiedad Comercial">Propiedad Comercial</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="col-6 col-12-xsmall">
                        <label>Localidad</label>
                        <input type="text" name="Localidad" placeholder="Ej: Villa María" required />
                    </div>
                    <div class="col-6 col-12-xsmall">
                        <label>Provincia</label>
                        <input type="text" name="Provincia" value="Córdoba" required />
                    </div>
                    <div class="col-6 col-12-xsmall">
                        <label>Zona / Barrios de Preferencia</label>
                        <input type="text" name="Zona/Barrios de Preferencia" placeholder="Ej: Centro / Rivadavia" />
                    </div>

                    <div class="col-12">
                        <div class="section-title" style="margin-top: 2em;">Presupuesto Estimado</div>
                    </div>
                    
                    <div class="col-6 col-12-xsmall">
                        <label>Presupuesto U$S</label>
                        <input type="number" name="Presupuesto U$d" placeholder="Monto en Dólares" />
                    </div>
                    <div class="col-6 col-12-xsmall">
                        <label>Presupuesto AR$</label>
                        <input type="number" name="Presupuesto Ar$" placeholder="Monto en Pesos" />
                    </div>

                    <div class="col-12">
                        <div class="section-title" style="margin-top: 2em;">Comodidades y Pedidos</div>
                    </div>
                    
                    <div class="col-2 col-4-small col-6-xsmall" style="text-align: center;">
                        <label>Dormits.</label>
                        <input type="number" name="Dormitorios" value="1" min="1" />
                    </div>
                    <div class="col-2 col-4-small col-6-xsmall" style="text-align: center;">
                        <label>Baños</label>
                        <input type="number" name="Baños" value="1" min="1" />
                    </div>
                    <div class="col-2 col-4-small col-6-xsmall">
                        <label>Garaje</label>
                        <select name="Garaje"><option value="No">No</option><option value="Si">Si</option></select>
                    </div>
                    <div class="col-2 col-4-small col-6-xsmall">
                        <label>Asador</label>
                        <select name="Asador"><option value="No">No</option><option value="Si">Si</option></select>
                    </div>
                    <div class="col-2 col-4-small col-6-xsmall">
                        <label>Piscina</label>
                        <select name="Piscina"><option value="No">No</option><option value="Si">Si</option></select>
                    </div>
                    <div class="col-2 col-4-small col-6-xsmall">
                        <label>Balcón</label>
                        <select name="Balcón"><option value="No">No</option><option value="Si">Si</option></select>
                    </div>

                    <div class="col-12" style="margin-top: 1.5em;">
                        <label>Pedidos Especiales</label>
                        <input type="text" name="Pedidos Especiales" placeholder="Algún detalle adicional (máximo un renglón)" maxlength="150" />
                    </div>

                    <div class="col-12" style="margin-top: 3em;">
                        <ul class="actions stacked">
                            <li><button type="submit" class="button primary fit">Enviar</button></li>
                        </ul>
                    </div>
                </div>
            </form>
        </div>
    </section>
</article>
    </div>

    <script>
        // Importante: Asegúrate de que el script en Google Apps Script reciba estos nombres de campos
        const NUEVA_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwdbemxXTtrUNCLcUGOMKsfg_C5tY4A5-edIeSf1qpYTcttA_YQ1RdHc-qqlZXFfd8rzw/exec';

        document.getElementById('form-busqueda').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const form = this;
            btn.disabled = true;
            btn.innerText = 'Enviando...';
            const data = new URLSearchParams(new FormData(form));

            fetch(NUEVA_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: data
            })
            .then(() => {
                alert('¡Búsqueda de inversión enviada con éxito! Nos contactaremos pronto.');
                form.reset();
            })
            .catch(err => {
                alert('Hubo un problema al enviar la búsqueda.');
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = 'Enviar mi Búsqueda';
            });
        });
    </script>
</body>
</html>
