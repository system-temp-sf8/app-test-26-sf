<!DOCTYPE HTML>
<html>
<head>
    <title>Comprar - Dueño Vende</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <style>
        /* 1. Sincronización de fondo total */
        body, #page-wrapper, .wrapper.style5, #main { 
            background-color: #212534 !important; 
        }

        /* 2. ENCABEZADO ULTRA-COMPACTO (Efecto Cinta) */
        #main > header {
            padding: 0 !important; 
            margin: 0 !important;
            min-height: 2.2em !important; 
            height: 2.2em !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background-color: #212534 !important; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
            background-image: none !important;
        }

        #main > header:before { display: none !important; }

        #main > header h2 {
            font-size: 0.85em !important; 
            font-weight: 400 !important;
            margin: 0 !important;
            color: rgba(255, 255, 255, 0.7) !important;
            text-transform: uppercase !important;
            letter-spacing: 3px !important;
        }

        .wrapper.style5 { padding-top: 1.5em !important; }

        /* 3. RESALTADO AL PASAR EL CURSOR (Hover effect) */
        .property-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            margin-bottom: 1.2em; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: all 0.3s ease; /* Transición suave */
        }

        /* El efecto que mencionaste que se había ido */
        .property-card:hover { 
            transform: translateY(-5px) !important; 
            background: rgba(255, 255, 255, 0.08) !important;
            border-color: #D4A261 !important; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4) !important;
        }

        .property-info { padding: 0.8em 1em 0.4em 1em !important; }

        /* 4. CONTRASTE DEL BARRIO (Blanco brillante) */
        #contenedor-propiedades .property-card .property-info h3 { 
            color: #ffffff !important; 
            opacity: 1 !important;
            font-size: 1.1em !important; 
            margin-bottom: 0.3em !important; 
            line-height: 1.2 !important;
            font-weight: 700 !important; 
            text-transform: none !important;
            letter-spacing: 0.5px !important;
            background: none !important;
        }

        /* Aseguramos que el texto dentro del h3 también sea blanco */
        #contenedor-propiedades .property-card .property-info h3 strong {
            color: #ffffff !important;
        }

        .property-details {
            font-size: 0.85em !important; 
            margin-bottom: 0.8em !important; 
            color: #f0f0f0 !important; 
        }

        .property-details strong { color: #D4A261 !important; }
        .price-tag { font-size: 1.3em; color: #2ecc71 !important; font-weight: 700; margin: 0.2em 0; }

        .image.fit { position: relative; margin: 0 !important; }
        .image.fit img { height: 160px; object-fit: cover; width: 100%; display: block; filter: brightness(0.85); }
        .badge-tipo { position: absolute; top: 10px; left: 10px; background: rgba(212, 162, 97, 0.9); color: white !important; padding: 2px 8px; border-radius: 3px; font-size: 0.65em; text-transform: uppercase; font-weight: 700; z-index: 10; }
        
        .button.primary.fit { height: 2.5em !important; line-height: 2.5em !important; font-size: 0.7em !important; }
    
        /* 7. ESTILO DE LA BARRA DE FILTROS */
        .filter-bar {
            background-color: #212534;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap; /* Para que en móviles no se rompa */
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: rgba(255, 255, 255, 0.6) !important;
            padding: 0 12px !important;
            height: 2em !important;
            line-height: 2em !important;
            font-size: 0.65em !important;
            text-transform: uppercase !important;
            letter-spacing: 1px !important;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: none !important;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
        }

        /* Clase para el botón presionado/activo */
        .filter-btn.active {
            background: #D4A261 !important; /* Dorado Spectral */
            color: #ffffff !important;
            border-color: #D4A261 !important;
            font-weight: 700 !important;
        }
    
        /* Botones de paginación Minimalistas */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 4em 0;
            width: 100%;
            clear: both;
        }

        .page-btn {
            height: 2.5em !important;
            line-height: 2.5em !important;
            padding: 0 1em !important;
            font-size: 0.65em !important; /* Letra bien chica */
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: transparent !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: #ffffff !important;
            min-width: auto !important; /* Evita que sean gigantes */
        }

        .page-btn:hover:not([disabled]) {
            border-color: #D4A261 !important;
            color: #D4A261 !important;
        }

        .page-btn[disabled] {
            opacity: 0.2;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.05) !important;
        }

        .page-info {
            font-size: 0.7em;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 10px;
        }

        /* Estilos del Modal */
        .modal-custom {
    display: none; /* Esto es vital para que no bloquee clics */
    position: fixed;
    z-index: 9999; /* Que esté bien arriba de todo */
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.85);
    overflow: hidden; /* El bloqueo de scroll queda contenido aquí */
}

.modal-content {
    background-color: #212534;
    margin: 5vh auto;
    padding: 25px;
    width: 90%;
    max-width: 800px;
    border-radius: 8px;
    position: relative;
    max-height: 85vh; /* Evita que el modal sea más largo que la pantalla */
    overflow-y: auto; /* Permite scroll SOLO dentro del modal si el texto es largo */
}
        /* Diseño del contenido del Modal */
        .modal-data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-section h4 {
            color: #D4A261;
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px;
            padding-bottom: 5px;
        }

        .info-list { list-style: none; padding: 0; font-size: 0.9em; }
        .info-list li { margin-bottom: 5px; color: rgba(255,255,255,0.8); }
        .info-list strong { color: #fff; }

        /* Grilla de Fotos */
        .modal-gallery {
    display: grid;
    /* Evita que se estiren de más si hay pocas */
    grid-template-columns: repeat(auto-fit, minmax(200px, 300px)); 
    gap: 15px;
    margin-top: 20px;
    justify-content: center; 
}

.modal-gallery img {
    width: 100%;
    height: 220px; 
    object-fit: cover; 
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid rgba(255,255,255,0.1);
}

.modal-gallery img:hover { 
    transform: scale(1.03); 
    border-color: #D4A261;
}

/* El ajuste para móviles (Media Query) */
@media screen and (max-width: 480px) {
    .modal-gallery {
        grid-template-columns: 1fr; 
    }
    .modal-gallery img {
        height: 180px;
    }
}
/* Fin Diseño del contenido del Modal */
        .close-modal {
            position: absolute;
            right: 20px; top: 10px;
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
        }

        .close-modal:hover { color: #D4A261; }

        .modal-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .modal-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 4px; }
        .modal-text { flex: 1; min-width: 300px; }
        .modal-text h2 { color: #fff; margin-bottom: 10px; border-bottom: 1px solid #D4A261; padding-bottom: 10px; }


        /* Botón Ver Detalles - Estilo Fino */
        .btn-detalles {
            height: 2.2em !important;
            line-height: 2.2em !important;
            padding: 0 1em !important;
            font-size: 0.65em !important;
            text-transform: uppercase !important;
            letter-spacing: 2px !important;
            background-color: transparent !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: #ffffff !important; /* Texto blanco puro */
            margin-bottom: 8px !important;
            transition: all 0.3s ease;
        }

        .btn-detalles:hover {
            border-color: #D4A261 !important;
            color: #D4A261 !important;
            background-color: rgba(212, 162, 97, 0.1) !important;
        }

        body.modal-open {
    overflow: hidden !important;
}

/* El modal debe permitir scroll interno si el texto es largo */
.modal-content {
    overflow-y: auto !important;
    max-height: 90vh;
}

    </style>
</head>
<body class="is-preload">
    <div id="page-wrapper">
        <header id="header">
            <h1><a href="index.html">Dueño Vende</a></h1>
            <nav id="nav">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="vender.html">Publicar</a></li>
                </ul>
            </nav>
        </header>

        <article id="main">
            <header>
                <h2>Catálogo de Ventas</h2>
            </header>

<div class="filter-bar">
                <button class="filter-btn active" onclick="filtrarPropiedades('Todos', this)">Todos</button>
                <button class="filter-btn" onclick="filtrarPropiedades('Casa', this)">Casas</button>
                <button class="filter-btn" onclick="filtrarPropiedades('Depto', this)">Deptos</button>
                <button class="filter-btn" onclick="filtrarPropiedades('Terreno', this)">Terrenos</button>
                <button class="filter-btn" onclick="filtrarPropiedades('Comercial', this)">Propiedad Comercial</button>
            </div>

            <section class="wrapper style5">


            
            <section class="wrapper style5">
                <div class="inner">
                    <div class="row" id="contenedor-propiedades">
                        <div class="col-12"><p style="text-align: center;">Buscando propiedades...</p></div>
                    </div>
                </div>
            </section>
        </article>

        <!-- Modal de Vista Ampliada -->
<div id="modal-propiedad" class="modal-custom">
    <div class="modal-content">
        <span class="close-modal" onclick="cerrarModal()">&times;</span>
        <div id="modal-detalle-body">
            <!-- Aquí se inyecta la info dinámicamente -->
        </div>
    </div>
</div>

    </div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/main.js"></script>

    <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwklod03hncuhwPqNTRywST272_e60xe3Ear9QShDvAn0JM8Y8Xz9dQ23w2WQwtOCMn/exec'; 
    
    let todasLasPropiedades = []; 
    let propiedadesFiltradas = [];
    let paginaActual = 1;
    const porPagina = 6; // BAJAMOS A 6 PARA PROBAR LA PAGINACIÓN
    let filtroActual = 'Todos';

    async function cargarPropiedades() {
        const contenedor = document.getElementById('contenedor-propiedades');
        try {
            const response = await fetch(SCRIPT_URL + '?read=true');
            const data = await response.json();
            
            todasLasPropiedades = data.filter(prop => {
                if (!prop || prop.length < 13) return false;
                const estado = String(prop[3] || "");
                const operacion = String(prop[12] || "");
                return estado.includes("Aprobado") && operacion.includes("Venta");
            });

            const btnTodos = Array.from(document.querySelectorAll('.filter-btn'))
                                  .find(el => el.textContent.trim() === 'Todos');
            
            filtrarPropiedades('Todos', btnTodos);

        } catch (error) {
            contenedor.innerHTML = '<div class="col-12"><p style="text-align:center;">Error al conectar.</p></div>';
        }
    }

    function filtrarPropiedades(tipo, btn) {
        filtroActual = tipo;
        paginaActual = 1;

        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        if (tipo === 'Todos' || tipo === '') {
            propiedadesFiltradas = todasLasPropiedades;
        } else {
            propiedadesFiltradas = todasLasPropiedades.filter(prop => {
                const tipoProp = String(prop[13] || "");
                return tipoProp.toLowerCase().includes(tipo.toLowerCase());
            });
        }
        renderizar();
    }

    function renderizar() {
        const contenedor = document.getElementById('contenedor-propiedades');
        contenedor.innerHTML = '';

        const inicio = (paginaActual - 1) * porPagina;
        const fin = inicio + porPagina;
        const loteActual = propiedadesFiltradas.slice(inicio, fin);

        loteActual.forEach((prop) => {
            const idProp = String(prop[1] || "0"); // El ID de la columna B
            const barrio = String(prop[20] || "").trim();
            const localidad = String(prop[19] || "").trim();
            const tipoInmueble = String(prop[13] || "");
            const precio = String(prop[14] || "Consultar");
            
            const ubicacionHTML = (barrio && barrio !== "-") 
                ? `<span style="color: #ffffff !important;">${barrio}</span>, ${localidad}` 
                : `${localidad}`;

            const superficie = (prop[16] && prop[16] !== "-" && prop[16] !== "0") ? `<strong>${prop[16]} m²</strong>` : "";
            const dormValue = String(prop[21] || "").trim();
            const dormitorios = (dormValue && dormValue !== "-" && dormValue !== "0") ? `${superficie ? ' | ' : ''}<strong>${dormValue} Dorm.</strong>` : "";
            const detallesHTML = (superficie || dormitorios) ? `<p class="property-details">${superficie}${dormitorios}</p>` : "";

            const card = `
                <div class="col-4 col-12-medium">
                    <article class="property-card">
                        <span class="image fit" style="cursor: pointer;" onclick="abrirModal('${idProp}')">
                            <span class="badge-tipo">Venta | ${tipoInmueble}</span>
                            <img src="${prop[4]}" alt="Propiedad" onerror="this.src='images/placeholder.jpg'">
                        </span>
                        <div class="property-info">
                            <h3 style="color: #ffffff !important;">${ubicacionHTML}</h3>
                            <p class="price-tag">USD ${precio}</p>
                            ${detallesHTML} 
                            
                            <ul class="actions stacked" style="margin-top: auto; margin-bottom: 0;">
                                <li>
                                    <!-- BOTÓN DE DETALLES (NUEVO) -->
                                    <button class="button small fit btn-detalles" onclick="abrirModal('${idProp}')">
        Ver Detalles
    </button>
                                </li>
                                <li>
                                    <a href="https://wa.me/5493534293301?text=Hola! Me interesa la propiedad ID: ${idProp}" 
                                       target="_blank" class="button primary fit" style="background-color: #25D366 !important; border: none;">
                                        WhatsApp
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </article>
                </div>`;
            contenedor.innerHTML += card;
        });

        renderizarPaginacion();
    }

    function renderizarPaginacion() {
        const totalPaginas = Math.ceil(propiedadesFiltradas.length / porPagina);
        const contenedor = document.getElementById('contenedor-propiedades');
        
        if (totalPaginas <= 1) return; 

        const navHTML = `
            <div class="col-12 pagination-container">
                <button class="button small page-btn" ${paginaActual === 1 ? 'disabled' : ''} onclick="cambiarPagina(-1)">
                    ‹ Ant.
                </button>
                
                <span class="page-info">${paginaActual} / ${totalPaginas}</span>
                
                <button class="button small page-btn" ${paginaActual === totalPaginas ? 'disabled' : ''} onclick="cambiarPagina(1)">
                    Sig. ›
                </button>
            </div>`;
        
        // Lo agregamos al final del contenedor
        contenedor.insertAdjacentHTML('beforeend', navHTML);
    }

    function cambiarPagina(paso) {
        paginaActual += paso;
        const mainElement = document.getElementById('main');
        window.scrollTo({ top: mainElement.offsetTop - 50, behavior: 'smooth' });
        renderizar();
    }

    document.addEventListener('DOMContentLoaded', cargarPropiedades);

    function abrirModal(id) {
    const prop = todasLasPropiedades.find(p => p[1] == id);
    if (!prop) return;

    const body = document.getElementById('modal-detalle-body');
    
    // Función para validar si un campo tiene contenido real
    const tieneDato = (val) => {
        if (!val) return false;
        const v = String(val).trim().toLowerCase();
        return v !== "" && v !== "-" && v !== "0" && v !== "no" && v !== "n/a";
    };

    // --- PROCESAR COMODIDADES (Solo las que "tiene") ---
    const listaComodidades = [];
    if (tieneDato(prop[21])) listaComodidades.push(`<li><strong>Dormitorios:</strong> ${prop[21]}</li>`);
    if (tieneDato(prop[22])) listaComodidades.push(`<li><strong>Baños:</strong> ${prop[22]}</li>`);
    if (tieneDato(prop[23])) listaComodidades.push(`<li><strong>Garage:</strong> Si</li>`);
    if (tieneDato(prop[24])) listaComodidades.push(`<li><strong>Asador:</strong> Si</li>`);
    if (tieneDato(prop[25])) listaComodidades.push(`<li><strong>Piscina:</strong> Si</li>`);
    if (tieneDato(prop[26])) listaComodidades.push(`<li><strong>Balcón:</strong> Si</li>`);

    // --- PROCESAR SERVICIOS (Solo los que "tiene") ---
    const serviciosActivos = [];
    if (tieneDato(prop[27])) serviciosActivos.push("Electricidad");
    if (tieneDato(prop[28])) serviciosActivos.push("Gas Natural");
    if (tieneDato(prop[29])) serviciosActivos.push("Agua Corriente");
    if (tieneDato(prop[30])) serviciosActivos.push("Cloacas");
    if (tieneDato(prop[31])) serviciosActivos.push("Pavimento");

    // --- PROCESAR FOTOS ---
    let fotosHTML = '';
    [4, 5, 6, 7].forEach(idx => {
        if (prop[idx] && String(prop[idx]).includes('http')) {
            fotosHTML += `<img src="${prop[idx]}" alt="Foto" onclick="window.open(this.src, '_blank')">`;
        }
    });

    body.innerHTML = `
        <h2 style="margin-bottom:5px; color:#fff;">${prop[13]} en ${prop[12]}</h2>
        <p style="color:#D4A261; font-size: 1.8em; font-weight: bold; margin-bottom:20px;">USD ${prop[14]}</p>

        <div class="modal-data-grid">
            <div class="info-section">
                <h4>Ubicación y Medidas</h4>
                <ul class="info-list">
                    <li><strong>Barrio:</strong> ${prop[20] || '-'}</li>
                    <li><strong>Localidad:</strong> ${prop[19]}</li>
                    <li><strong>Provincia:</strong> ${prop[18]}</li>
                    ${tieneDato(prop[16]) ? `<li><strong>Sup. Total:</strong> ${prop[16]} m²</li>` : ''}
                    ${tieneDato(prop[17]) ? `<li><strong>Sup. Cubierta:</strong> ${prop[17]} m²</li>` : ''}
                    ${tieneDato(prop[32]) ? `<li><strong>Estado Legal:</strong> ${prop[32]}</li>` : ''}
                </ul>
            </div>

            <div class="info-section">
                ${listaComodidades.length > 0 ? `
                    <h4>Comodidades</h4>
                    <ul class="info-list">${listaComodidades.join('')}</ul>
                ` : ''}
            </div>
        </div>

        ${serviciosActivos.length > 0 ? `
            <div class="info-section">
                <h4>Servicios</h4>
                <p style="font-size: 0.9em; color: rgba(255,255,255,0.8); letter-spacing: 0.5px;">
                    ${serviciosActivos.join(' • ')}
                </p>
            </div>
        ` : ''}

        <div class="info-section" style="margin-top:20px;">
            <h4>Descripción</h4>
            <p style="font-size: 0.95em; line-height:1.6; white-space: pre-line;">${prop[34] || 'Consulte para más detalles.'}</p>
        </div>

        <div class="info-section">
            <h4>Galería de Fotos</h4>
            <div class="modal-gallery">
                ${fotosHTML}
            </div>
        </div>
    `;
    
    document.getElementById('modal-propiedad').style.display = "block";
    document.body.style.overflow = "hidden";
}

function cerrarModal() {
    const modal = document.getElementById('modal-propiedad');
    if (modal) {
        modal.style.display = "none";
    }
    
    // Forzamos el scroll en todos los contenedores posibles
    document.body.style.overflow = "visible";
    document.body.style.position = "static";
    document.documentElement.style.overflow = "visible";
    
    // Quitamos cualquier clase de bloqueo que hayamos probado antes
    document.body.classList.remove('modal-open');
}

// Actualizamos el clic fuera del modal para que use la misma lógica
window.addEventListener('click', function(event) {
    const modal = document.getElementById('modal-propiedad');
    if (event.target === modal) {
        cerrarModal();
    }
});

// Por seguridad, al cargar la página nos aseguramos que el scroll esté activo
document.addEventListener('DOMContentLoaded', () => {
    document.body.style.overflow = "visible";
    document.documentElement.style.overflow = "visible";
});

// También actualizamos el cierre al hacer clic afuera
window.onclick = function(event) {
    const modal = document.getElementById('modal-propiedad');
    if (event.target == modal) {
        cerrarModal(); // Usamos la función de arriba para que limpie el scroll
    }
}

// Bonus: Cerrar con la tecla Esc
document.addEventListener('keydown', function(event) {
    if (event.key === "Escape") {
        cerrarModal();
    }
});

// Cerrar si hace clic afuera del contenido
window.onclick = function(event) {
    const modal = document.getElementById('modal-propiedad');
    if (event.target == modal) {
        modal.style.display = "none";
    }
}


</script>
</body>
</html>
